<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy with Zoom Effect</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
  <style>
    #player {
      display: none;
    }
    #musicButton {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      background-color: #ffffff10;
      color: white;
      border: 1px solid white;
      border-radius: 8px;
      cursor: pointer;
      z-index: 9999;
      font-weight: bold;
      backdrop-filter: blur(5px);
    }
    #musicButton:hover {
      background-color: #ffffff30;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>
<h1 style="position: fixed; bottom: 10px; right: 10px; font-size: 18px; font-family: Arial, sans-serif; color: white; background: rgba(0, 0, 0, 0.4); padding: 6px 12px; border-radius: 8px; z-index: 9999;">
  Happy Birthday Sayang! 🎉
</h1>
  <audio id="audioPlayer" loop>
    <source src="musik/lagu.mp3" type="audio/mpeg">
  </audio>
  <button id="musicButton">Mainkan Musik 🎵</button>
  <script>
    const audioPlayer = document.getElementById('audioPlayer');
    const musicButton = document.getElementById('musicButton');
    let isPlaying = false;

    // Auto-play musik saat halaman siap
    window.addEventListener('load', () => {
      audioPlayer.play().catch((error) => {
        console.log('Auto-play diblokir:', error);
      });
      isPlaying = true;
      musicButton.innerText = "Pause Musik ⏸️";
    });

    // Kontrol play/pause dengan tombol
    musicButton.addEventListener('click', () => {
      if (isPlaying) {
        audioPlayer.pause();
        musicButton.innerText = "Mainkan Musik 🎵";
        isPlaying = false;
      } else {
        audioPlayer.play();
        musicButton.innerText = "Pause Musik ⏸️";
        isPlaying = true;
      }
    });
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
