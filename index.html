<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy with Zoom Effect</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Quicksand:wght@500;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
  <style>
    #player {
      display: none;
    }

    /* Love Message Styling */
    #loveText {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.08);
      color: #ff006e;
      border: 1.5px solid rgba(255, 0, 110, 0.7);
      border-radius: 50px;
      z-index: 9999;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(255, 0, 110, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3);
      animation: float 3s ease-in-out infinite;
    }

    #loveText:hover {
      background: rgba(255, 0, 110, 0.15);
      box-shadow: 0 12px 48px rgba(255, 0, 110, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.4);
      border-color: rgba(255, 0, 110, 0.9);
    }

    /* Happy Birthday Text Styling */
    #birthdayText {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #b800ff;
      background: rgba(255, 255, 255, 0.08);
      padding: 12px 24px;
      border-radius: 50px;
      z-index: 9998;
      box-shadow: 0 8px 32px rgba(184, 0, 255, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(15px);
      border: 1.5px solid rgba(184, 0, 255, 0.7);
      animation: float 3s ease-in-out infinite;
      letter-spacing: 0.5px;
      text-shadow: 0 4px 15px rgba(184, 0, 255, 0.5);
      transition: all 0.3s ease;
    }

    #birthdayText:hover {
      background: rgba(184, 0, 255, 0.25);
      box-shadow: 0 12px 48px rgba(184, 0, 255, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.4);
      border-color: rgba(184, 0, 255, 0.95);
      text-shadow: 0 4px 20px rgba(184, 0, 255, 0.8);
    }
    

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.8;
      }
    }

    .emoji-bounce {
      display: inline-block;
      animation: bounce 0.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>
  
  <div id="birthdayText">
    happy birthday to my universe! ✨
  </div>

  <audio id="audioPlayer" autoplay loop playsinline>
    <source src="./musik/lagu.mp3" type="audio/mpeg">
  </audio>
  <div id="loveText">i loveee you 🤍</div>
  <script>
    const audioPlayer = document.getElementById('audioPlayer');

    // Auto-play musik saat halaman siap
    window.addEventListener('load', () => {
      audioPlayer.play().catch((error) => {
        console.log('Auto-play error:', error);
      });
    });

    // Fallback: start music setelah delay kecil
    setTimeout(() => {
      audioPlayer.play().catch((error) => {
        console.log('Auto-play error:', error);
      });
    }, 500);

    // Jika auto-play masih terblokir, play saat user interaksi pertama
    document.addEventListener('click', () => {
      audioPlayer.play();
    }, { once: true });
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
